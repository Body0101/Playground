version: "3.9"

# ══════════════════════════════════════════
#   Smart Attendance System — Docker Compose
#
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f
#   Reset:   docker compose down -v
# ══════════════════════════════════════════

services:

  # ── Node.js app ────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:    production
      PORT:        3000
      JWT_SECRET:  ${JWT_SECRET:?JWT_SECRET must be set in .env}
      AUTO_BACKUP: "true"
      MAX_BACKUPS: "14"
      BACKUP_EVERY: "21600000"   # 6 hours
    volumes:
      # Persist DB + backups outside container
      - attendance_data:/app/data
      - attendance_logs:/app/logs
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 20s
    networks:
      - attendance_net

  # ── Nginx reverse proxy (optional) ─────
  # Uncomment to expose on port 80 with clean URLs
  # nginx:
  #   image: nginx:alpine
  #   container_name: attendance-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     app:
  #       condition: service_healthy
  #   networks:
  #     - attendance_net

volumes:
  attendance_data:
  attendance_logs:

networks:
  attendance_net:
    driver: bridge
