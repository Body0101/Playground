<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>نظام الحضور الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════
   DESIGN SYSTEM
══════════════════════════════════════════════════════ */
:root{
  --bg:#07090f; --bg2:#0f1219; --bg3:#161a24; --bg4:#1c2130;
  --border:#1e2333; --border2:#262d3f;
  --blue:#3b82f6; --blue2:#6366f1;
  --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; --purple:#a855f7;
  --text:#dde3f0; --text2:#6b7594; --text3:#3d4460;
  --r:12px; --shadow:0 4px 32px rgba(0,0,0,.5);
  --font:'Cairo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
  background-size:48px 48px;
}

/* ── SCREENS ── */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}
#auth-screen.active{display:flex;}

/* ══════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════ */
#auth-screen{
  min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,.12),transparent);
}
.auth-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:430px;
  box-shadow:var(--shadow),0 0 80px rgba(59,130,246,.06);
  animation:fadeUp .4s ease;
}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo .logo-icon{
  width:72px;height:72px;border-radius:22px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;font-size:32px;
  box-shadow:0 8px 28px rgba(59,130,246,.35);
}
.auth-logo h1{font-size:22px;font-weight:900;}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:4px;}

.tab-bar{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:3px;margin-bottom:26px;}
.tab-btn{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--text2);
  font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;transition:.2s;}
.tab-btn.active{background:var(--blue);color:#fff;box-shadow:0 2px 14px rgba(59,130,246,.4);}

/* ── FORM ── */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
input,select,textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:11px 14px;color:var(--text);
  font-family:var(--font);font-size:14px;outline:none;transition:.2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
input::placeholder,textarea::placeholder{color:var(--text3);}
select option{background:var(--bg3);}
textarea{resize:vertical;min-height:90px;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 20px;border:none;border-radius:10px;
  font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
  white-space:nowrap;
}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;width:100%;
  box-shadow:0 4px 18px rgba(59,130,246,.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,.45);}
.btn-primary:active{transform:none;}
.btn-green {background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.btn-green:hover{background:rgba(34,197,94,.25);}
.btn-red   {background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-red:hover{background:rgba(239,68,68,.25);}
.btn-yellow{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}
.btn-yellow:hover{background:rgba(245,158,11,.25);}
.btn-ghost {background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px;}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:6px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}

.err{color:var(--red);font-size:12px;margin-top:6px;display:none;}
.err.show{display:block;}
.suc{color:var(--green);font-size:12px;margin-top:6px;display:none;}
.suc.show{display:block;}

/* ══════════════════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════════════════ */
#main-screen.active{display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;height:58px;
  background:rgba(7,9,15,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.status-dot{
  width:9px;height:9px;border-radius:50%;background:var(--text3);transition:.4s;
}
.status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:glow 2s infinite;}
.brand-name{font-weight:900;font-size:16px;letter-spacing:-.3px;}

.topbar-right{display:flex;align-items:center;gap:8px;}
.user-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50px;padding:5px 14px 5px 5px;
}
.user-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
}
.user-name{font-size:13px;font-weight:600;}
.role-badge{
  padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;
}
.role-badge.student{background:rgba(59,130,246,.2);color:var(--blue);}
.role-badge.ta     {background:rgba(168,85,247,.2);color:var(--purple);}
.role-badge.admin  {background:rgba(239,68,68,.2); color:var(--red);}

/* ── SESSION BANNER ── */
.session-strip{
  background:linear-gradient(90deg,rgba(34,197,94,.08),rgba(59,130,246,.06));
  border-bottom:1px solid rgba(34,197,94,.2);
  padding:8px 20px;display:flex;align-items:center;justify-content:space-between;
  font-size:13px;animation:fadeIn .3s;
}
.session-strip.hidden{display:none;}
.session-strip .live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:glow 1.5s infinite;display:inline-block;margin-left:6px;
}

/* ── CONTENT + NAV ── */
.main-body{flex:1;display:flex;flex-direction:column;}
.content{max-width:900px;width:100%;margin:0 auto;padding:22px 18px;flex:1;}

.nav-tabs{
  display:flex;gap:5px;margin-bottom:22px;
  overflow-x:auto;scrollbar-width:none;padding-bottom:2px;
}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{
  flex-shrink:0;padding:8px 16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;
}
.nav-tab:hover{border-color:var(--blue);color:var(--blue);}
.nav-tab.active{
  background:rgba(59,130,246,.1);border-color:var(--blue);color:var(--blue);
  box-shadow:0 0 16px rgba(59,130,246,.1);
}
.n-badge{
  background:var(--red);color:#fff;border-radius:20px;
  padding:1px 6px;font-size:10px;font-weight:800;line-height:1.5;
}

/* ══════════════════════════════════════════════════════
   CARDS & COMPONENTS
══════════════════════════════════════════════════════ */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;margin-bottom:14px;box-shadow:0 2px 16px rgba(0,0,0,.3);
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;}
.card-sub{font-size:12px;color:var(--text2);}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
.stat-box{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:14px;text-align:center;
}
.stat-val{font-size:30px;font-weight:900;line-height:1;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;font-weight:600;}
.stat-box.blue   .stat-val{color:var(--blue);}
.stat-box.green  .stat-val{color:var(--green);}
.stat-box.red    .stat-val{color:var(--red);}
.stat-box.yellow .stat-val{color:var(--yellow);}
.stat-box.purple .stat-val{color:var(--purple);}

/* ── TABLE-LIKE ROWS ── */
.row-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;
}
.row-item:last-child{border-bottom:none;}
.row-name{font-weight:700;}
.row-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}

.chip{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.chip-green {background:rgba(34,197,94,.15); color:var(--green);}
.chip-red   {background:rgba(239,68,68,.15);  color:var(--red);}
.chip-yellow{background:rgba(245,158,11,.15); color:var(--yellow);}
.chip-blue  {background:rgba(59,130,246,.15);  color:var(--blue);}
.chip-purple{background:rgba(168,85,247,.15);  color:var(--purple);}

/* ── HAND BUTTON ── */
.hand-hero{text-align:center;padding:28px 16px;}
.hand-btn-wrap{position:relative;display:inline-block;margin:16px 0;}
.hand-btn{
  width:120px;height:120px;border-radius:50%;background:var(--bg3);
  border:3px solid var(--border2);font-size:52px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.3s;
  outline:none;
}
.hand-btn:hover{transform:scale(1.06);}
.hand-btn.raised{
  border-color:var(--yellow);background:rgba(245,158,11,.1);
  box-shadow:0 0 0 0 rgba(245,158,11,.4);
  animation:handPulse 1.6s infinite;
}
.hand-count-lbl{color:var(--text2);font-size:13px;font-weight:600;}

/* ── QUIZ ── */
.quiz-q{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:16px;margin-bottom:12px;
}
.quiz-q .q-num{font-size:11px;color:var(--blue);font-weight:800;margin-bottom:6px;}
.quiz-q .q-text{font-weight:700;font-size:14px;line-height:1.65;margin-bottom:12px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{
  padding:10px 13px;background:var(--bg2);border:2px solid var(--border2);
  border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;
  color:var(--text);text-align:right;transition:.2s;
}
.opt:hover{border-color:var(--blue);}
.opt.sel  {border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue);}
.opt.right{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green);}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red);}

/* ── SCORE ── */
.score-hero{text-align:center;padding:32px 20px;}
.score-big{
  font-size:80px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.score-sub{color:var(--text2);font-size:14px;margin-top:8px;}

/* ── QUIZ BUILDER ── */
.qb-item{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-bottom:10px;}
.qb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:800;font-size:13px;}
.opts2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.opt-row{display:flex;align-items:center;gap:8px;}
.opt-row label{font-size:12px;font-weight:700;color:var(--text2);width:20px;flex-shrink:0;}

/* ── COMPLAINTS / MESSAGES ── */
.msg-card{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.2s;
}
.msg-card.unread{border-color:var(--blue);}
.msg-card:hover{border-color:var(--border);}
.msg-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.msg-from{font-weight:800;font-size:13px;}
.msg-time{font-size:11px;color:var(--text2);}
.msg-body{color:var(--text2);font-size:13px;line-height:1.6;}
.msg-reply{
  margin-top:10px;padding:10px 12px;background:rgba(34,197,94,.07);
  border-radius:8px;font-size:12px;color:var(--green);border:1px solid rgba(34,197,94,.2);
}

/* ── AUDIT ── */
.audit-row{
  display:flex;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border);
  font-size:12px;align-items:baseline;
}
.audit-row:last-child{border-bottom:none;}
.audit-action{
  padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;
  background:rgba(59,130,246,.15);color:var(--blue);flex-shrink:0;
}
.audit-meta{color:var(--text2);flex:1;}
.audit-time{color:var(--text3);font-size:11px;flex-shrink:0;}

/* ── RFID ── */
.rfid-popup{
  position:fixed;top:72px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:2px solid var(--blue);border-radius:16px;
  padding:18px 28px;z-index:999;text-align:center;min-width:260px;
  box-shadow:0 8px 40px rgba(59,130,246,.3);display:none;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
.rfid-popup.show{display:block;}
.rfid-scan-ico{font-size:28px;margin-bottom:6px;}
.rfid-name{font-size:18px;font-weight:900;}
.rfid-status{font-size:13px;margin-top:4px;}

/* ── HISTORY TABLE ── */
.hist-table{width:100%;border-collapse:collapse;font-size:12px;}
.hist-table th{
  text-align:right;padding:8px 12px;background:var(--bg3);
  color:var(--text2);font-weight:700;font-size:11px;border-bottom:1px solid var(--border2);
}
.hist-table td{padding:9px 12px;border-bottom:1px solid var(--border);}
.hist-table tr:last-child td{border-bottom:none;}

/* ── EMPTY + SPINNER ── */
.empty{text-align:center;padding:48px 20px;color:var(--text2);}
.empty .empty-ico{font-size:48px;margin-bottom:14px;opacity:.45;}
.empty p{font-size:14px;}
.spinner{
  width:36px;height:36px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;margin:40px auto;
  animation:spin .65s linear infinite;
}

/* ── HERO REGISTER ── */
.reg-hero{text-align:center;padding:36px 20px;}
.reg-hero .hero-ico{font-size:56px;margin-bottom:14px;animation:float 3s ease-in-out infinite;}
.reg-hero h2{font-size:21px;font-weight:900;}
.reg-hero .hero-sub{color:var(--text2);font-size:13px;margin:8px 0 22px;}

/* ── RATING STARS ── */
.stars{display:flex;gap:6px;justify-content:center;margin:12px 0;}
.star{font-size:28px;cursor:pointer;opacity:.4;transition:.15s;}
.star.active{opacity:1;}

/* ── ALERTS ── */
.alert{
  padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow);}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--blue);}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);}

/* ── TOASTS ── */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:9999;}
.toast{
  background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
  padding:12px 16px;font-size:13px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:9px;min-width:230px;
  animation:slideInRight .3s cubic-bezier(.34,1.56,.64,1);
}
.toast.success{border-color:var(--green);}
.toast.error  {border-color:var(--red);}
.toast.warning{border-color:var(--yellow);}
.toast.info   {border-color:var(--blue);}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:16px 0;}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-head h3{font-size:14px;font-weight:800;}

/* ══════════════════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════════════════ */
@keyframes fadeUp      {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn      {from{opacity:0}to{opacity:1}}
@keyframes slideDown   {from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn       {from{opacity:0;transform:translateX(-50%) scale(.88)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes float       {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow        {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes handPulse   {0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}60%{box-shadow:0 0 0 16px rgba(245,158,11,0)}}
@keyframes spin        {to{transform:rotate(360deg)}}
@keyframes slideIn     {from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════════════ */
@media(max-width:480px){
  .content{padding:14px 12px;}
  .auth-card{padding:24px 16px;}
  .opts-grid{grid-template-columns:1fr;}
  .opts2{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .topbar{padding:0 14px;}
}
</style>
</head>
<body>

<!-- ════════════════════ AUTH ════════════════════ -->
<div id="auth-screen" class="screen active">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <h1>نظام الحضور الذكي</h1>
      <p>سجّل دخولك بإيميل الكلية</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="authTab('login')">تسجيل الدخول</button>
      <button class="tab-btn"        onclick="authTab('register')">حساب جديد</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group"><label>الإيميل</label>
        <input id="li-email" type="email" placeholder="you@university.edu" dir="ltr" autocomplete="email">
      </div>
      <div class="form-group"><label>كلمة المرور</label>
        <input id="li-pass" type="password" placeholder="••••••••" dir="ltr" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <p id="li-err" class="err"></p>
      <button class="btn btn-primary" onclick="doLogin()" id="li-btn">دخول ←</button>
    </div>

    <!-- REGISTER -->
    <div id="register-form" style="display:none">
      <div class="form-group"><label>الاسم الكامل</label>
        <input id="re-name" type="text" placeholder="محمد أحمد">
      </div>
      <div class="form-group"><label>الإيميل (كلية فقط)</label>
        <input id="re-email" type="email" placeholder="s12345@university.edu" dir="ltr">
      </div>
      <div class="form-group"><label>كلمة المرور</label>

<!-- ════════════════════ SCRIPT ════════════════════ -->
<script>
'use strict';
// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let token    = localStorage.getItem('att_tok');
let me       = JSON.parse(localStorage.getItem('att_me') || 'null');
let socket   = null;
let curTab   = '';
let session  = null;   // active session object
let handUp   = false;
let quizAnswers  = {};
let quizDone     = false;
let rfidPopTimer = null;
let isVPN        = false;
let isIncognito  = false;

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async () => {
  if (token && me) { await detectPrivacy(); startApp(); }
})();

// ════════════════════════════════════════════
//  PRIVACY DETECTION
// ════════════════════════════════════════════
async function detectPrivacy() {
  // Incognito via storage quota
  try {
    if (navigator.storage?.estimate) {
      const { quota } = await navigator.storage.estimate();
      if (quota && quota < 120 * 1024 * 1024) isIncognito = true;
    }
  } catch {}
  // Incognito via deprecated FileSystem API
  try {
    const fs = window.RequestFileSystem || window.webkitRequestFileSystem;
    if (fs) await new Promise(r => fs(0, 0, r, () => { isIncognito = true; r(); }));
  } catch {}
  // VPN via WebRTC
  try {
    const pc = new RTCPeerConnection({ iceServers: [] });
    pc.createDataChannel('');
    await pc.setLocalDescription(await pc.createOffer());
    await new Promise(r => setTimeout(r, 600));
    const ips = (pc.localDescription?.sdp || '').match(/\d+\.\d+\.\d+\.\d+/g) || [];
    for (const ip of ips) {
      if (!/^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/.test(ip) && ip !== '127.0.0.1') {
        isVPN = true; break;
      }
    }
    pc.close();
  } catch {}
}

// ════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════
function authTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (t==='login'?0:1)===i));
  $('login-form').style.display    = t === 'login'    ? '' : 'none';
  $('register-form').style.display = t === 'register' ? '' : 'none';
}
function toggleStudentFields() {
  $('student-extra').style.display = $('re-role').value === 'student' ? '' : 'none';
}

async function doLogin() {
  const email = $('li-email').value.trim();
  const pass  = $('li-pass').value;
  const errEl = $('li-err');
  errEl.classList.remove('show');
  if (!email || !pass) { errEl.textContent='أدخل الإيميل وكلمة المرور'; errEl.classList.add('show'); return; }
  const btn = $('li-btn'); btn.disabled = true; btn.textContent = '...';
  try {
    const res = await api('POST','/api/login',{ email, password: pass });
    saveAuth(res); await detectPrivacy(); startApp();
  } catch(e) { errEl.textContent = e.message; errEl.classList.add('show'); }
  btn.disabled = false; btn.textContent = 'دخول ←';
}

async function doRegister() {
  const errEl = $('re-err'); const sucEl = $('re-suc');
  errEl.classList.remove('show'); sucEl.classList.remove('show');
  const data = {
    name: $('re-name').value.trim(), email: $('re-email').value.trim(),
    password: $('re-pass').value, role: $('re-role').value,
    studentId: $('re-sid').value.trim(), section: $('re-sec').value.trim(),
    rfidUid: $('re-rfid').value.trim() || null,
  };
  if (!data.name || !data.email || !data.password) { errEl.textContent='أكمل الحقول المطلوبة'; errEl.classList.add('show'); return; }
  if (data.password.length < 6) { errEl.textContent='كلمة المرور قصيرة (6+ أحرف)'; errEl.classList.add('show'); return; }
  const btn = $('re-btn'); btn.disabled = true; btn.textContent = '...';
  try {
    const res = await api('POST','/api/register', data);
    saveAuth(res); await detectPrivacy(); startApp();
  } catch(e) { errEl.textContent = e.message; errEl.classList.add('show'); }
  btn.disabled = false; btn.textContent = 'إنشاء الحساب ←';
}

function saveAuth(res) {
  token = res.token; me = res.user;
  localStorage.setItem('att_tok', token);
  localStorage.setItem('att_me',  JSON.stringify(me));
}

function logout() {
  localStorage.removeItem('att_tok'); localStorage.removeItem('att_me');
  token = null; me = null; session = null;
  socket?.disconnect();
  $('main-screen').classList.remove('active');
  $('auth-screen').classList.add('active');
}

// ════════════════════════════════════════════
//  APP START
// ════════════════════════════════════════════
function startApp() {
  $('auth-screen').classList.remove('active');
  $('main-screen').classList.add('active');

  // Topbar
  $('topbar-name').textContent   = me.name;
  $('topbar-avatar').textContent = me.name.charAt(0).toUpperCase();
  $('topbar-role').textContent   = {student:'طالب',ta:'معيد',admin:'أدمن'}[me.role] || me.role;
  $('topbar-role').className     = `role-badge ${me.role}`;

  // Socket
  socket = io();
  wireSocket();

  // Role-based UI
  if      (me.role === 'student') buildStudentUI();
  else if (me.role === 'ta')      buildTaUI();
  else                            buildAdminUI();
}

// ════════════════════════════════════════════
//  SOCKET
// ════════════════════════════════════════════
function wireSocket() {
  socket.on('init', d => {
    session = d.session;
    if (d.device?.active) $('status-dot').classList.add('on');
    updateStrip();
  });

  socket.on('session_started', d => {
    session = d.session; updateStrip();
    toast(`جلسة بدأت — ${d.taName}`, 'info');
    if (me.role === 'student' && curTab === 'attend') render('attend');
    if ((me.role === 'ta' || me.role === 'admin') && curTab === 'overview') render('overview');
  });

  socket.on('session_ended', () => {
    session = null; updateStrip();
    toast('انتهت الجلسة', 'warning');
    if (me.role === 'student' && curTab === 'attend') render('attend');
  });

  socket.on('device_activated', () => {
    $('status-dot').classList.add('on');
    toast('🔴 الجهاز مفعّل — نافذة التسجيل مفتوحة!', 'success');
  });

  socket.on('device_timeout', () => $('status-dot').classList.remove('on'));

  socket.on('rfid_scan', d => {
    if (me.role !== 'ta' && me.role !== 'admin') return;
    showRfidPop(d);
    if (curTab === 'attend') render('attend');
  });

  socket.on('student_checked_in', d => {
    if (me.role === 'student') return;
    toast(`✅ ${d.studentName} سجّل حضوره`, 'success');
    if (d.isVpn || d.isIncognito)
      toast(`⚠️ ${d.studentName} — ${d.isVpn ? 'VPN' : 'Incognito'}`, 'warning');
    if (curTab === 'overview' || curTab === 'attend') render(curTab);
  });

  socket.on('suspicious_activity', d => {
    if (me.role === 'student') return;
    toast(`🚨 ${d.studentName} — ${d.type}`, 'warning');
  });

  socket.on('hand_update', d => {
    if (me.role === 'student') {
      document.querySelectorAll('.hand-count-lbl').forEach(el => el.textContent = `${d.count} طالب رافع يده`);
    } else {
      updateBadge('b-questions', d.count);
      if (curTab === 'questions') render('questions');
    }
  });

  socket.on('new_complaint', d => {
    if (me.role === 'student') return;
    toast(`💬 شكوى من ${d.studentName}`, 'info');
    updateBadge('b-complaints', (parseInt(document.getElementById('b-complaints')?.textContent || '0') + 1));
    if (curTab === 'complaints') render('complaints');
  });

  socket.on('quiz_activated', d => {
    if (me.role !== 'student') return;
    toast(`📝 كويز جديد: ${d.title}`, 'info');
    if (curTab === 'quiz') render('quiz');
  });

  socket.on('quiz_deactivated', () => {
    if (me.role !== 'student') return;
    toast('الكويز أُوقف', 'warning');
    if (curTab === 'quiz') render('quiz');
  });

  socket.on('hand_responded', d => {
    if (me.role !== 'student' || d.studentId !== me.id) return;
    if (d.action === 'bonus')   toast(`🎉 المعيد منحك بونص ${d.amount} درجة`, 'success');
    if (d.action === 'penalty') toast(`⚠️ المعيد خصم منك ${d.amount} درجة`, 'warning');
    handUp = false;
    if (curTab === 'hand') render('hand');
  });
}

// ════════════════════════════════════════════
//  SESSION STRIP
// ════════════════════════════════════════════
function updateStrip() {
  const strip = $('session-strip');
  if (!session) { strip.classList.add('hidden'); return; }
  strip.classList.remove('hidden');
  $('strip-text').textContent = 'جلسة نشطة';
  const t = new Date(session.date);
  $('strip-meta').textContent = `سكشن: ${session.section || 'عام'} • بدأت ${t.toLocaleTimeString('ar')}`;
  // End button only for owning TA/admin
  const acts = $('strip-actions');
  if ((me.role === 'ta' || me.role === 'admin') && session.ta_id === me.id) {
    acts.innerHTML = `<button class="btn btn-red btn-xs" onclick="endSession()">إنهاء ←</button>`;
  } else { acts.innerHTML = ''; }
}

//  NAV BUILDER
// ════════════════════════════════════════════
function buildStudentUI() {
  buildNav([
    { id:'attend',   icon:'✅', label:'الحضور' },
    { id:'hand',     icon:'✋', label:'رفع يد' },
    { id:'quiz',     icon:'📝', label:'الكويز' },

}

function buildTaUI() {
  buildNav([
    { id:'overview',   icon:'📊', label:'لوحة التحكم' },
    { id:'attend',     icon:'📋', label:'الحضور' },
    { id:'questions',  icon:'✋', label:'أيدي مرفوعة', badge:'b-questions' },
    { id:'quizmanage', icon:'📝', label:'الكويز' },
    { id:'complaints', icon:'💬', label:'الشكاوى', badge:'b-complaints' },
    { id:'rfid',       icon:'📡', label:'RFID' },
    { id:'feedback',   icon:'⭐', label:'فيدباك' },
  ], 'overview');
}

function buildAdminUI() {
  buildNav([
    { id:'overview',   icon:'📊', label:'لوحة التحكم' },
    { id:'attend',     icon:'📋', label:'الحضور' },
    { id:'questions',  icon:'✋', label:'أيدي مرفوعة', badge:'b-questions' },
    { id:'quizmanage', icon:'📝', label:'الكويز' },
    { id:'complaints', icon:'💬', label:'الشكاوى', badge:'b-complaints' },
    { id:'rfid',       icon:'📡', label:'RFID' },
    { id:'audit',      icon:'🔍', label:'Audit Log' },
    { id:'feedback',   icon:'⭐', label:'فيدباك' },
  ], 'overview');
}

function buildNav(tabs, def) {
  $('nav-tabs').innerHTML = tabs.map(t => `
    <button class="nav-tab${t.id===def?' active':''}" id="nt-${t.id}" onclick="showTab('${t.id}')">
      ${t.icon} ${t.label}
      ${t.badge ? `<span class="n-badge" id="${t.badge}" style="display:none">0</span>` : ''}
    </button>`).join('');
  showTab(def);
}

function showTab(id) {
  curTab = id;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('nt-'+id)?.classList.add('active');
  render(id);
}

function render(id) {
  const fns = {
    attend:    renderAttend,
    hand:      renderHand,
    quiz:      renderQuiz,
    complaint: renderComplaint,
    history:   renderHistory,
    overview:  renderOverview,
    questions: renderQuestions,
    quizmanage:renderQuizManage,
    complaints:renderComplaints,
    rfid:      renderRfid,
    audit:     renderAudit,
    feedback:  renderFeedback,
  };
  fns[id]?.();
}

function updateBadge(id, count) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = count;
  el.style.display = count > 0 ? '' : 'none';
}

// ════════════════════════════════════════════
//  ─── STUDENT TABS ───
// ════════════════════════════════════════════

// ── ATTEND ────────────────────────────────
async function renderAttend() {
  const c = $('tab-content');
  if (!session) {
    c.innerHTML = card('✅ تسجيل الحضور', `<div class="empty"><div class="empty-ico">🔒</div><p>لا توجد جلسة نشطة حالياً<br>انتظر حتى يبدأ المعيد الجلسة</p></div>`);
    return;
  }
  const warns = [
    isVPN       ? `<div class="alert alert-warn">⚠️ يبدو أنك تستخدم VPN — سيُبلَّغ المعيد بذلك</div>` : '',
    isIncognito ? `<div class="alert alert-warn">⚠️ وضع التصفح الخفي مكتشَف — سيُبلَّغ المعيد</div>` : '',
  ].join('');

  c.innerHTML = `<div class="card">
    <div class="reg-hero">
      <div class="hero-ico">📱</div>
      <h2>سجّل حضورك</h2>
      <p class="hero-sub">الجلسة الحالية: سكشن ${session.section || 'عام'}</p>
      ${warns}
      <button class="btn btn-primary" style="max-width:280px" onclick="registerAttend()" id="reg-att-btn">✅ سجّل حضوري الآن</button>
      <p id="att-ok"  class="suc" style="margin-top:12px;font-size:14px;"></p>
      <p id="att-err" class="err" style="margin-top:12px;font-size:14px;"></p>
    </div>
  </div>`;
}

async function registerAttend() {
  const btn = $('reg-att-btn'); btn.disabled = true; btn.textContent = '...';
  try {
    const r = await api('POST','/api/attendance/register',{ sessionId: session.id, isVpn: isVPN, isIncognito });
    $('att-ok').textContent = r.message; $('att-ok').classList.add('show');
    btn.textContent = '✅ تم التسجيل'; toast('تم تسجيل حضورك!', 'success');
  } catch(e) {
    $('att-err').textContent = e.message; $('att-err').classList.add('show');
    btn.disabled = false; btn.textContent = '✅ سجّل حضوري الآن';
  }
}

// ── RAISE HAND ────────────────────────────
async function renderHand() {
  const c = $('tab-content');
  if (!session) {
    c.innerHTML = card('✋ رفع اليد', `<div class="empty"><div class="empty-ico">🔒</div><p>لا توجد جلسة نشطة</p></div>`);
    return;
  }
  c.innerHTML = `<div class="card">
    <div class="card-head"><div class="card-title">✋ رفع اليد</div></div>
    <div class="alert alert-info" style="margin-bottom:16px;">
      ⚠️ إذا رفعت يدك بدون سؤال حقيقي، قد يخصم منك المعيد درجة!
    </div>
    <div class="hand-hero">
      <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">اضغط الزر لرفع يدك وإخبار المعيد أن لديك سؤال</p>
      <div class="hand-btn-wrap">
        <button class="hand-btn${handUp?' raised':''}" onclick="toggleHand()" id="hand-btn">${handUp?'✋':'🖐️'}</button>
      </div>
      <p class="hand-count-lbl" id="hand-count-lbl">...</p>
    </div>
  </div>`;
}

async function toggleHand() {
  try {
    const r = await api('POST','/api/raise-hand',{});
    handUp = r.raised;
    const btn = $('hand-btn');
    if (btn) { btn.className = `hand-btn${handUp?' raised':''}`; btn.textContent = handUp ? '✋' : '🖐️'; }
    const lbl = $('hand-count-lbl');
    if (lbl) lbl.textContent = `${r.count} طالب رافع يده`;
    toast(handUp ? '✋ تم رفع يدك' : 'تم إنزال يدك', handUp ? 'info' : 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── QUIZ (student) ─────────────────────────
async function renderQuiz() {
  const c = $('tab-content');
  c.innerHTML = `<div class="spinner"></div>`;
  try {
    const r = await api('GET','/api/quizzes/active');
    if (!r.quiz) {
      c.innerHTML = card('📝 الكويز', `<div class="empty"><div class="empty-ico">📝</div><p>لا يوجد كويز نشط حالياً</p></div>`);
      return;
    }
    if (quizDone) { renderQuizScore(c, r.quiz); return; }

    quizAnswers = {};
    const quiz = r.quiz;
    let html = `<div class="card"><div class="card-head"><div class="card-title">📝 ${quiz.title}</div><span class="chip chip-blue">${quiz.questions.length} سؤال</span></div>`;
    quiz.questions.forEach((q, i) => {
      html += `<div class="quiz-q">
        <div class="q-num">سؤال ${i+1}</div>
        <div class="q-text">${q.question}</div>
        <div class="opts-grid">
          ${[['A','option_a'],['B','option_b'],['C','option_c'],['D','option_d']].filter(([,k])=>q[k]).map(([lbl,k])=>`
            <button class="opt" id="opt-${q.id}-${lbl}" onclick="pickOpt(${q.id},'${lbl}',this)">
              <b>${lbl})</b> ${q[k]}
            </button>`).join('')}
        </div>
      </div>`;
    });
    html += `<p id="quiz-err" class="err"></p>
      <button class="btn btn-primary" onclick="submitQuiz(${quiz.id})">إرسال الإجابات ←</button></div>`;
    c.innerHTML = html;
  } catch(e) { c.innerHTML = card('خطأ', `<p style="color:var(--red)">${e.message}</p>`); }
}

function pickOpt(qId, opt, el) {
  quizAnswers[qId] = opt;
  document.querySelectorAll(`[id^="opt-${qId}-"]`).forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
}

async function submitQuiz(qId) {
  const errEl = $('quiz-err');
  try {
    const r = await api('POST',`/api/quizzes/${qId}/submit`,{ answers: quizAnswers });
    quizDone = true;
    const c = $('tab-content');
    c.innerHTML = `<div class="card"><div class="score-hero">
      <div style="font-size:48px;margin-bottom:12px;">🎉</div>
      <div class="score-big">${r.percentage}%</div>
      <div class="score-sub">${r.score} من ${r.total} إجابة صحيحة</div>
      <button class="btn btn-ghost" style="margin-top:20px" onclick="quizDone=false;render('quiz')">عرض الكويز</button>
    </div></div>`;
    toast(`نتيجتك: ${r.percentage}%`, r.percentage >= 60 ? 'success' : 'warning');
  } catch(e) { if(errEl){errEl.textContent=e.message;errEl.classList.add('show');} toast(e.message,'error'); }
}

// ── COMPLAINT ─────────────────────────────
function renderComplaint() {
  $('tab-content').innerHTML = `<div class="card">
    <div class="card-head"><div class="card-title">💬 إرسال شكوى أو ملاحظة</div></div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:14px;">اكتب شكواك وستصل مباشرة للمعيد بشكل مجهول المصدر.</p>
    <div class="form-group"><label>نص الشكوى</label>
      <textarea id="comp-txt" placeholder="اكتب شكواك هنا..."></textarea>

async function respondHand(id, action) {
  let amount = 1;
  if (action !== 'dismiss') {
    const v = prompt(`عدد الدرجات (${action==='bonus'?'بونص':'خصم'}):`, '1');
    if (v === null) return;
    amount = parseFloat(v) || 1;
  }
  try {
    await api('POST',`/api/raised-hands/${id}/respond`,{ action, amount });
    document.getElementById(`hi-${id}`)?.remove();
    toast(action==='bonus' ? `✅ بونص ${amount}` : action==='penalty' ? `⚠️ خصم ${amount}` : 'تم الرد', 'success');
    const cur = parseInt(document.getElementById('b-questions')?.textContent||'0');
    updateBadge('b-questions', Math.max(0, cur - 1));
  } catch(e) { toast(e.message,'error'); }
}

let qbCount = 0;
function addQBQuestion() {
  qbCount++;
  const n = qbCount;
  const div = document.createElement('div');
  div.className = 'qb-item'; div.id = `qb-${n}`;
  div.innerHTML = `
    <div class="qb-head">
      <span>سؤال ${n}</span>
      <button class="btn btn-red btn-xs" onclick="document.getElementById('qb-${n}').remove()">حذف</button>
    </div>
    <div class="form-group" style="margin-bottom:8px;">
      <input type="text" id="qq-${n}" placeholder="نص السؤال">
    </div>
    <div class="opts2">
      ${[['أ','a'],['ب','b'],['ج','c'],['د','d']].map(([ar,en])=>`
        <div class="opt-row"><label>${ar}</label><input type="text" id="qo-${en}-${n}" placeholder="الاختيار ${ar}"></div>
      `).join('')}
    </div>
    <div class="form-group" style="margin-top:10px;">
      <label>الإجابة الصحيحة</label>
      <select id="qc-${n}">
        <option value="A">أ</option><option value="B">ب</option>
        <option value="C">ج</option><option value="D">د</option>
      </select>
    </div>`;
  document.getElementById('qb-questions').appendChild(div);
}

async function createQuiz() {
  const title = $('qb-title')?.value.trim();
  if (!title) { toast('أدخل عنوان الكويز','error'); return; }
  const questions = [];
  document.querySelectorAll('.qb-item').forEach(item => {
    const n = item.id.replace('qb-','');
    const q = { question: $(` qq-${n}`)?.value.trim()||document.getElementById(`qq-${n}`)?.value.trim(),
      a: document.getElementById(`qo-a-${n}`)?.value.trim(),
      b: document.getElementById(`qo-b-${n}`)?.value.trim(),
      c: document.getElementById(`qo-c-${n}`)?.value.trim()||null,
      d: document.getElementById(`qo-d-${n}`)?.value.trim()||null,
      correct: document.getElementById(`qc-${n}`)?.value };
    if (q.question && q.a && q.b) questions.push(q);
  });
  if (!questions.length) { toast('أضف سؤالاً واحداً على الأقل','error'); return; }
  try {
    await api('POST','/api/quizzes',{ title, questions });
    toast('تم إنشاء الكويز!','success');
    qbCount = 0; render('quizmanage');
  } catch(e) { toast(e.message,'error'); }
}

          <span class="chip chip-blue">${r.cards.length}</span>
        </div>
        ${r.cards.length
          ? r.cards.map(c=>`
            <div class="row-item">
              <div>
                <div class="row-name" style="font-family:monospace;font-size:13px;">${c.uid}</div>
                <div class="row-meta">${c.name||'—'} ${c.sid?`(${c.sid})`:''}</div>
              </div>
              <span class="chip ${c.name?'chip-green':'chip-yellow'}">${c.name?'مربوطة':'غير مربوطة'}</span>
            </div>`).join('')
          : '<div class="empty" style="padding:20px"><p>لا توجد بطاقات مسجلة</p></div>'}
      </div>`;
  } catch(e) { c.innerHTML = errCard(e.message); }
}

async function assignRfid() {
  const uid   = $('rfid-uid')?.value.trim().toUpperCase();
  const email = $('rfid-email')?.value.trim().toLowerCase();
  const label = $('rfid-label')?.value.trim();
  if (!uid || !email) { toast('أدخل UID وإيميل الطالب','error'); return; }

  // Find student id by email — call /api/me equivalent via a workaround:
  // We'll POST to a special lookup. For now use assign with label only if no studentId
  try {
    await api('POST','/api/rfid/assign',{ uid, label: label || email });
    toast('تم ربط البطاقة!','success'); render('rfid');
  } catch(e) { toast(e.message,'error'); }
}

// ── AUDIT (admin) ─────────────────────────
async function renderAudit() {
  const c = $('tab-content');
  c.innerHTML = `<div class="spinner"></div>`;
  try {
    const r = await api('GET','/api/audit?limit=200');
    c.innerHTML = `<div class="card">
      <div class="card-head">
        <div class="card-title">🔍 Audit Log</div>
        <span class="chip chip-purple">${r.logs.length} سجل</span>
      </div>
      ${r.logs.map(l=>`
        <div class="audit-row">
          <span class="audit-action">${l.action}</span>
          <span class="audit-meta">${l.user_name||'—'} ${l.entity?`→ ${l.entity}`:''} ${l.entity_id?`#${l.entity_id}`:''} ${l.ip?`· ${l.ip}`:''}</span>
          <span class="audit-time">${new Date(l.created_at).toLocaleString('ar-EG')}</span>
        </div>`).join('')||'<div class="empty"><p>لا توجد سجلات</p></div>'}
    </div>`;
  } catch(e) { c.innerHTML = errCard(e.message); }
}

// ── FEEDBACK ──────────────────────────────
function renderFeedback() {
  let rating = 0;
  $('tab-content').innerHTML = `<div class="card">
    <div class="card-head"><div class="card-title">⭐ فيدباك للمطور</div></div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">شاركنا ملاحظاتك وأفكارك لتحسين النظام</p>
    <div class="form-group"><label>تقييمك للنظام</label>
      <div class="stars" id="stars-wrap">
        ${[1,2,3,4,5].map(i=>`<span class="star" id="star-${i}" onclick="setRating(${i})">⭐</span>`).join('')}
      </div>
    </div>
    <div class="form-group"><label>ملاحظاتك</label>
      <textarea id="fb-txt" placeholder="اكتب ملاحظاتك هنا..."></textarea>
    </div>
    <p id="fb-ok"  class="suc"></p>
    <p id="fb-err" class="err"></p>
    <button class="btn btn-primary" onclick="sendFeedback()">إرسال الفيدباك ←</button>
  </div>`;
}

let fbRating = 0;
function setRating(n) {
  fbRating = n;
  for (let i=1;i<=5;i++) {
    const s = document.getElementById(`star-${i}`);
    if (s) s.classList.toggle('active', i<=n);
  }
}

async function sendFeedback() {
  const txt = $('fb-txt')?.value.trim();
  if (!txt) { toast('اكتب ملاحظتك أولاً','error'); return; }
  try {
    await api('POST','/api/feedback',{ content: txt, rating: fbRating||null });
    $('fb-ok').textContent='✅ شكراً! تم إرسال فيدباكك للمطور';
    $('fb-ok').classList.add('show');
    $('fb-txt').value=''; fbRating=0;
    document.querySelectorAll('.star').forEach(s=>s.classList.remove('active'));
    toast('تم الإرسال!','success');
  } catch(e) { $('fb-err').textContent=e.message; $('fb-err').classList.add('show'); }
}

// ════════════════════════════════════════════
//  RFID POPUP
// ════════════════════════════════════════════
function showRfidPop(d) {
  $('rfid-name').textContent = d.found ? d.name : `كارت: ${d.uid}`;
  $('rfid-status').innerHTML = d.found
    ? (d.registered
        ? `<span style="color:var(--green)">✅ مسجّل الحضور</span>`
        : `<span style="color:var(--red)">❌ لم يسجّل بعد</span>`)
    : `<span style="color:var(--yellow)">⚠️ كارت غير معروف في النظام</span>`;
  $('rfid-popup').classList.add('show');
  clearTimeout(rfidPopTimer);
  rfidPopTimer = setTimeout(() => $('rfid-popup').classList.remove('show'), 6000);
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function toast(msg, type='info') {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const wrap = $('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]||'•'}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),350); }, 4000);
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function $(id) { return document.getElementById(id); }

function card(title, body) {
  return `<div class="card"><div class="card-head"><div class="card-title">${title}</div></div>${body}</div>`;
}
function errCard(msg) {
  return `<div class="card"><p style="color:var(--red);font-size:13px;">خطأ: ${msg}</p></div>`;
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type':'application/json', ...(token ? {Authorization:`Bearer ${token}`} : {}) },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res  = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
